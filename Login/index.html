<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="tudo">
        <form id="formulario">
            <div class="tudo">

                <h1 id="inicial">Login</h1>

                <label class="ema">Email</label>
                <input class="email" type="email" placeholder="Insira seu email">
                <label class="sen">Senha</label>
                <input type="password" placeholder="Insira sua senha" minlength="8" maxlength="20">
                <p>Não tem conta? <a href="#">Cadastre-se</a></p>
                <button id="login">Entrar</button>
            </div>
        </form>
    </div>
</body>


</html>
